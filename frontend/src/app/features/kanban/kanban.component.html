<main class="home-content">
  <div class="page-header">
    <h1 class="page-title">
      {{ project?.title || 'Meu Projeto' }}
    </h1>
    <p class="page-subtitle">Gerencie suas tarefas de forma eficiente</p>
  </div>

  <div class="kanban-board" #kanbanBoard>
    <div class="kanban-column" *ngFor="let column of columns; let i = index">
      <div class="column-header">
        <div class="column-header-left">
          <div class="column-title">{{ column.title }}</div>
          <span class="column-count">{{ column.tasks?.length || 0 }}</span>
        </div>
        <button class="column-menu-btn" (click)="openEditColumnModal(column)" title="Editar coluna">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="1"></circle>
            <circle cx="12" cy="5" r="1"></circle>
            <circle cx="12" cy="19" r="1"></circle>
          </svg>
        </button>
      </div>

      <div
        class="tasks-container"
        cdkDropList
        [id]="'cdk-drop-list-' + i"
        [cdkDropListData]="column.tasks"
        [cdkDropListConnectedTo]="getConnectedLists()"
        (cdkDropListDropped)="drop($event, column)"
      >
        <div
          class="card"
          *ngFor="let task of column.tasks"
          [ngClass]="{
            'priority-low': task.priority === 'low',
            'priority-medium': task.priority === 'medium',
            'priority-high': task.priority === 'high',
            'completed': task.completed
          }"
          cdkDrag
          (cdkDragStarted)="onDragStarted($event)"
        >
          <div class="card-actions">
            <button 
              class="card-action-btn edit-btn" 
              (click)="$event.stopPropagation(); column.id ? openEditTaskModal(task, column.id) : null"
              title="Editar tarefa"
            >
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
              </svg>
            </button>
            <button 
              class="card-action-btn delete-btn" 
              (click)="$event.stopPropagation(); column.id && task.id ? quickDeleteTask(task.id, column.id) : null"
              title="Excluir tarefa"
            >
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
              </svg>
            </button>
          </div>
          
          <div class="card-content">
            <div class="card-header-row">
              <div class="checkbox-container" (click)="$event.stopPropagation(); toggleTaskCompleted(task, column.id || '')">
                <input 
                  type="checkbox" 
                  [checked]="task.completed"
                  (click)="$event.stopPropagation()"
                />
                <span class="checkmark"></span>
              </div>
              <div class="card-title">{{ task.title }}</div>
            </div>

            <div class="card-description">
              {{ task.description }}
            </div>

            <div class="card-footer">
              <div class="card-tags" *ngIf="task.tag">
                <span class="tag">{{ task.tag }}</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <button class="add-card-btn" (click)="column.id ? openTaskModal(column.id) : null" [disabled]="!column.id">
        + Nova Tarefa
      </button>
    </div>

    <div class="modal" *ngIf="showTaskModal">
      <div class="modal-content" (click)="$event.stopPropagation()">
        <h2 class="modal-header">Nova Tarefa</h2>

        <form (ngSubmit)="createTask(newTask); $event.preventDefault()">
          <div class="form-group">
            <label class="form-label">Título *</label>
            <input type="text" class="form-input" [(ngModel)]="newTask.title" name="title" required />
          </div>

          <div class="form-group">
            <label class="form-label">Descrição</label>
            <textarea class="form-textarea" [(ngModel)]="newTask.description" name="description"></textarea>
          </div>

          <div class="form-group">
            <label class="form-label">Prioridade</label>
            <select class="form-select" [(ngModel)]="newTask.priority" name="priority">
              <option value="low">Baixa</option>
              <option value="medium">Média</option>
              <option value="high">Alta</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Tag</label>
            <input
              type="text"
              class="form-input"
              placeholder="ex: design, backend"
              [(ngModel)]="newTask.tag"
              name="tag"
            />
          </div>

          <div class="modal-actions">
            <button
              type="button"
              class="btn btn-secondary"
              (click)="closeTaskModal()"
            >
              Cancelar
            </button>

            <button type="submit" class="btn btn-primary" [disabled]="!newTask.title">Adicionar</button>
          </div>
        </form>
      </div>
    </div>

    <div class="modal" *ngIf="showColumnModal" (click)="closeColumnModal()">
      <div class="modal-content" (click)="$event.stopPropagation()">
        <h2 class="modal-header">Nova Coluna</h2>

        <form #columnForm="ngForm" (ngSubmit)="createColumn(columnName.value)">
          <div class="form-group">
            <label class="form-label">Nome da Coluna *</label>
            <input
              type="text"
              class="form-input"
              name="columnName"
              #columnName="ngModel"
              ngModel
              required
            />
          </div>

          <div class="modal-actions">
            <button
              type="button"
              class="btn btn-secondary"
              (click)="closeColumnModal()"
            >
              Cancelar
            </button>

            <button
              type="submit"
              class="btn btn-primary"
              [disabled]="columnForm.invalid"
            >
              Criar Coluna
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Nova Coluna -->
    <div class="add-column-btn" (click)="openColumnModal()">+ Nova Coluna</div>

    <app-modal-edit-tasks
      [isOpen]="isModalOpen"
      [task]="selectedTask"
      (close)="closeEditTaskModal()"
      (save)="saveTask($event)"
      (delete)="deleteTask()"
    ></app-modal-edit-tasks>

    <app-modal-edit-column
      [isOpen]="isEditColumnModalOpen"
      [column]="selectedColumn"
      (close)="closeEditColumnModal()"
      (save)="saveColumn($event)"
      (delete)="deleteColumn()"
    ></app-modal-edit-column>

    <!-- Modal de confirmação de exclusão de tarefa -->
    <app-modal-confirm-delete
      [isOpen]="isDeleteTaskModalOpen"
      [title]="'Confirmar Exclusão de Tarefa'"
      [itemName]="taskToDelete?.task?.title || ''"
      [itemType]="'tarefa'"
      [warningMessage]="'Esta ação não pode ser desfeita.'"
      [isLoading]="isLoading"
      [requireNameConfirmation]="false"
      (close)="closeDeleteTaskModal()"
      (confirm)="onDeleteTask()"
    ></app-modal-confirm-delete>

    <!-- Modal de confirmação de exclusão de coluna -->
    <app-modal-confirm-delete
      [isOpen]="isDeleteColumnModalOpen"
      [title]="'Confirmar Exclusão de Coluna'"
      [itemName]="columnToDelete?.title || ''"
      [itemType]="'coluna'"
      [warningMessage]="'Esta ação não pode ser desfeita. Todas as tarefas desta coluna serão perdidas!'"
      [isLoading]="isLoading"
      (close)="closeDeleteColumnModal()"
      (confirm)="onDeleteColumn()"
    ></app-modal-confirm-delete>
  </div>
</main>
